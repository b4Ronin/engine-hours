<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Engine Hours</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="top-bar">
    <button id="finalizeBtn" class="pill pill-primary">Finalize Day</button>
    <button id="setupBtn" class="pill pill-accent">Summary</button>
    <button id="logsBtn" class="pill pill-secondary">Logs</button>
  </header>

  <main id="mainContent" aria-live="polite"></main>

  <div id="keypad" aria-label="Number keypad">
    <div class="keys">
      <button type="button" data-key="1">1</button>
      <button type="button" data-key="2">2</button>
      <button type="button" data-key="3">3</button>
      <button type="button" data-key="4">4</button>
      <button type="button" data-key="5">5</button>
      <button type="button" data-key="6">6</button>
      <button type="button" data-key="7">7</button>
      <button type="button" data-key="8">8</button>
      <button type="button" data-key="9">9</button>
      <button type="button" data-key=".">.</button>
      <button type="button" data-key="0">0</button>
      <button type="button" data-action="backspace">⌫</button>
    </div>
    <button type="button" id="enterBtn">ENTER</button>
  </div>

  <script src="app.js"></script>
</body>
</html>

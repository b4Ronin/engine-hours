<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Engine Hours</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="topbar">
    <button id="finalizeBtn" class="lock" type="button">Finalize Day</button>
    <button id="setupBtn" class="setup" type="button">Setup</button>
    <button id="logsBtn" class="view" type="button">Logs</button>
  </div>

  <div id="headerWrap">
    <h1 id="dateTitle"></h1>
    <div id="modeLabel">Entry</div>
  </div>

  <div id="app"></div>

  <div id="keypad" aria-label="Number pad">
    <div class="row">
      <button type="button" onclick="press(1)">1</button>
      <button type="button" onclick="press(2)">2</button>
      <button type="button" onclick="press(3)">3</button>
    </div>
    <div class="row">
      <button type="button" onclick="press(4)">4</button>
      <button type="button" onclick="press(5)">5</button>
      <button type="button" onclick="press(6)">6</button>
    </div>
    <div class="row">
      <button type="button" onclick="press(7)">7</button>
      <button type="button" onclick="press(8)">8</button>
      <button type="button" onclick="press(9)">9</button>
    </div>
    <div class="row">
      <button type="button" onclick="press('.')">.</button>
      <button type="button" onclick="press(0)">0</button>
      <button type="button" onclick="back()">⌫</button>
    </div>
    <div class="row">
      <button type="button" class="enter" onclick="nextField()">ENTER</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Engine Hours</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0f14">
<style>
.editDayBtn{width:100%;background:#24364b;color:#fff;border:1px solid #334055;border-radius:12px;padding:14px;font-size:18px;font-weight:800;margin:0 0 12px 0}
.editField{width:100%;font-size:22px;text-align:right;background:#11161f;color:#00ffcc;border:1px solid #334055;border-radius:10px;padding:10px 12px}
.editRow{display:flex;justify-content:space-between;align-items:center;gap:10px}
</style>
</head>
<body>
<div id="topbar">
  <button id="finalizeBtn" class="lock" onclick="handleTopLeftButton()">Finalize Day</button>
  <button class="setup" onclick="confirmSetup()">Setup</button>
  <button class="view" onclick="showLogs()">Logs</button>
</div>

<div id="headerWrap">
  <h1 id="dateTitle"></h1>
  <div id="modeLabel">Entry</div>
</div>

<div id="app"></div>

<div id="keypad">
  <div class="row"><button onclick="press(1)">1</button><button onclick="press(2)">2</button><button onclick="press(3)">3</button></div>
  <div class="row"><button onclick="press(4)">4</button><button onclick="press(5)">5</button><button onclick="press(6)">6</button></div>
  <div class="row"><button onclick="press(7)">7</button><button onclick="press(8)">8</button><button onclick="press(9)">9</button></div>
  <div class="row"><button onclick="press('.')">.</button><button onclick="press(0)">0</button><button onclick="back()">⌫</button></div>
  <div class="row"><button class="enter" onclick="nextField()">ENTER</button></div>
</div>

<script src="app.js"></script>
</body>
</html>
